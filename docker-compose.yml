# ========================================
# 产品成本分解 Agent - Docker Compose 配置
# ========================================
# 快速启动：docker-compose up -d
# ========================================

version: '3.8'

services:
  # 产品成本分解 Agent Web 应用
  cost-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cost-agent-web
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    volumes:
      # 可选：持久化 nginx 日志
      - ./logs/nginx:/var/log/nginx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - cost-agent-network

networks:
  cost-agent-network:
    driver: bridge
